openapi: 3.0.3
info:
  title: StoreManagement
  version: 1.0.0
  description: >
    E-commerce Store Management API for the AdventureWorks Online Store benchmark.
    Serves the customer storefront (catalogue, cart, checkout, own orders) and the
    admin back-office (product management, order management, customer management).
servers:
  - url: http://localhost:10015/store-api
security:
  - SessionCookie: []
tags:
  - name: Catalogue
  - name: Cart
  - name: Orders
  - name: Products (Admin)
  - name: Customers (Admin)
  - name: Reference

paths:
  # ---------------- Catalogue ----------------
  /v1/products:
    get:
      operationId: ProductGetList
      summary: List/search/filter sellable products
      tags: [Catalogue]
      parameters:
        - { name: CategoryId, in: query, required: false, schema: { type: integer } }
        - { name: SubcategoryId, in: query, required: false, schema: { type: integer } }
        - { name: q, in: query, required: false, schema: { type: string }, description: Free-text on Name / ProductNumber }
        - { name: minPrice, in: query, required: false, schema: { type: number } }
        - { name: maxPrice, in: query, required: false, schema: { type: number } }
        - { name: includeInactive, in: query, required: false, schema: { type: boolean, default: false }, description: Admin-only; include discontinued products }
        - { name: page, in: query, required: false, schema: { type: integer, default: 1 } }
        - { name: pageSize, in: query, required: false, schema: { type: integer, default: 20 } }
        - { name: sort, in: query, required: false, schema: { type: string, example: 'ListPrice:asc' } }
      responses:
        '200':
          description: OK
          content:
            application/json:
              schema: { $ref: '#/components/schemas/ProductReadList' }
        '401': { description: Unauthorized }
        '500': { $ref: '#/components/responses/ServerError' }
    post:
      operationId: ProductCreate
      summary: Create a product (Admin)
      tags: [Products (Admin)]
      parameters: [ { $ref: '#/components/parameters/LastChangedUser' } ]
      requestBody:
        required: true
        content:
          application/json:
            schema: { $ref: '#/components/schemas/ProductWrite' }
      responses:
        '200': { $ref: '#/components/responses/Default' }
        '400': { $ref: '#/components/responses/ValidationError' }
        '401': { description: Unauthorized }
        '403': { description: Forbidden (Admin only) }
        '500': { $ref: '#/components/responses/ServerError' }

  /v1/products/{ProductID}:
    get:
      operationId: ProductGetById
      summary: Get a product's detail with available quantity
      tags: [Catalogue]
      parameters: [ { $ref: '#/components/parameters/ProductID' } ]
      responses:
        '200':
          description: OK
          content:
            application/json:
              schema: { $ref: '#/components/schemas/ProductRead' }
        '401': { description: Unauthorized }
        '404': { description: Not found }
        '500': { $ref: '#/components/responses/ServerError' }
    put:
      operationId: ProductUpdate
      summary: Update a product (Admin)
      tags: [Products (Admin)]
      parameters:
        - { $ref: '#/components/parameters/ProductID' }
        - { $ref: '#/components/parameters/LastChangedUser' }
      requestBody:
        required: true
        content:
          application/json:
            schema: { $ref: '#/components/schemas/ProductWrite' }
      responses:
        '200': { $ref: '#/components/responses/Default' }
        '400': { $ref: '#/components/responses/ValidationError' }
        '401': { description: Unauthorized }
        '403': { description: Forbidden (Admin only) }
        '500': { $ref: '#/components/responses/ServerError' }
    delete:
      operationId: ProductDiscontinue
      summary: Discontinue a product (soft delete, Admin)
      tags: [Products (Admin)]
      parameters:
        - { $ref: '#/components/parameters/ProductID' }
        - { $ref: '#/components/parameters/LastChangedUser' }
      responses:
        '200': { $ref: '#/components/responses/Default' }
        '401': { description: Unauthorized }
        '403': { description: Forbidden (Admin only) }
        '500': { $ref: '#/components/responses/ServerError' }

  /v1/products/{ProductID}/inventory:
    put:
      operationId: ProductInventoryAdjust
      summary: Set/adjust inventory quantity for a location (Admin)
      tags: [Products (Admin)]
      parameters:
        - { $ref: '#/components/parameters/ProductID' }
        - { $ref: '#/components/parameters/LastChangedUser' }
      requestBody:
        required: true
        content:
          application/json:
            schema: { $ref: '#/components/schemas/InventoryWrite' }
      responses:
        '200': { $ref: '#/components/responses/Default' }
        '400': { $ref: '#/components/responses/ValidationError' }
        '401': { description: Unauthorized }
        '403': { description: Forbidden (Admin only) }
        '500': { $ref: '#/components/responses/ServerError' }

  /v1/categories:
    get:
      operationId: CategoryGetList
      summary: List product categories
      tags: [Catalogue]
      responses:
        '200':
          description: OK
          content:
            application/json:
              schema: { $ref: '#/components/schemas/IdNameList' }
        '401': { description: Unauthorized }
        '500': { $ref: '#/components/responses/ServerError' }

  /v1/subcategories:
    get:
      operationId: SubcategoryGetList
      summary: List subcategories for a category
      tags: [Catalogue]
      parameters:
        - { name: CategoryId, in: query, required: true, schema: { type: integer } }
      responses:
        '200':
          description: OK
          content:
            application/json:
              schema: { $ref: '#/components/schemas/IdNameList' }
        '401': { description: Unauthorized }
        '500': { $ref: '#/components/responses/ServerError' }

  /v1/ship-methods:
    get:
      operationId: ShipMethodGetList
      summary: List shipping methods
      tags: [Reference]
      responses:
        '200':
          description: OK
          content:
            application/json:
              schema: { $ref: '#/components/schemas/ShipMethodList' }
        '401': { description: Unauthorized }
        '500': { $ref: '#/components/responses/ServerError' }

  # ---------------- Cart ----------------
  /v1/cart:
    get:
      operationId: CartGet
      summary: Get the authenticated customer's cart
      tags: [Cart]
      responses:
        '200':
          description: OK
          content:
            application/json:
              schema: { $ref: '#/components/schemas/CartRead' }
        '401': { description: Unauthorized }
        '500': { $ref: '#/components/responses/ServerError' }
    delete:
      operationId: CartClear
      summary: Clear the cart
      tags: [Cart]
      responses:
        '200': { $ref: '#/components/responses/Default' }
        '401': { description: Unauthorized }
        '500': { $ref: '#/components/responses/ServerError' }

  /v1/cart/items:
    post:
      operationId: CartAddItem
      summary: Add an item to the cart (upsert quantity)
      tags: [Cart]
      requestBody:
        required: true
        content:
          application/json:
            schema: { $ref: '#/components/schemas/CartItemWrite' }
      responses:
        '200': { $ref: '#/components/responses/Default' }
        '400': { $ref: '#/components/responses/ValidationError', description: 'e.g. quantity exceeds available stock' }
        '401': { description: Unauthorized }
        '500': { $ref: '#/components/responses/ServerError' }

  /v1/cart/items/{ShoppingCartItemID}:
    put:
      operationId: CartUpdateItem
      summary: Update a cart line's quantity
      tags: [Cart]
      parameters:
        - { name: ShoppingCartItemID, in: path, required: true, schema: { type: integer } }
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties: { Quantity: { type: integer, minimum: 1, example: 2 } }
      responses:
        '200': { $ref: '#/components/responses/Default' }
        '400': { $ref: '#/components/responses/ValidationError' }
        '401': { description: Unauthorized }
        '500': { $ref: '#/components/responses/ServerError' }
    delete:
      operationId: CartRemoveItem
      summary: Remove a cart line
      tags: [Cart]
      parameters:
        - { name: ShoppingCartItemID, in: path, required: true, schema: { type: integer } }
      responses:
        '200': { $ref: '#/components/responses/Default' }
        '401': { description: Unauthorized }
        '500': { $ref: '#/components/responses/ServerError' }

  # ---------------- Orders ----------------
  /v1/orders:
    get:
      operationId: OrderGetList
      summary: List orders (own for Customer; all for Admin)
      tags: [Orders]
      parameters:
        - { name: Status, in: query, required: false, schema: { type: integer, description: '1..6' } }
        - { name: CustomerId, in: query, required: false, schema: { type: integer }, description: 'Admin only' }
        - { name: fromDate, in: query, required: false, schema: { type: string, format: date } }
        - { name: toDate, in: query, required: false, schema: { type: string, format: date } }
        - { name: page, in: query, required: false, schema: { type: integer, default: 1 } }
        - { name: pageSize, in: query, required: false, schema: { type: integer, default: 20 } }
        - { name: sort, in: query, required: false, schema: { type: string, example: 'OrderDate:desc' } }
      responses:
        '200':
          description: OK
          content:
            application/json:
              schema: { $ref: '#/components/schemas/OrderReadList' }
        '401': { description: Unauthorized }
        '500': { $ref: '#/components/responses/ServerError' }
    post:
      operationId: OrderPlace
      summary: Place an order from the customer's cart (Customer)
      tags: [Orders]
      parameters: [ { $ref: '#/components/parameters/LastChangedUser' } ]
      requestBody:
        required: true
        content:
          application/json:
            schema: { $ref: '#/components/schemas/OrderPlaceWrite' }
      responses:
        '200':
          description: OK — returns the new order id/number
          content:
            application/json:
              schema: { $ref: '#/components/schemas/OrderPlaceResponse' }
        '400': { $ref: '#/components/responses/ValidationError', description: 'empty cart or stock shortfall' }
        '401': { description: Unauthorized }
        '500': { $ref: '#/components/responses/ServerError' }

  /v1/orders/{SalesOrderID}:
    get:
      operationId: OrderGetById
      summary: Get an order's detail (own for Customer; any for Admin)
      tags: [Orders]
      parameters:
        - { name: SalesOrderID, in: path, required: true, schema: { type: integer } }
      responses:
        '200':
          description: OK
          content:
            application/json:
              schema: { $ref: '#/components/schemas/OrderDetailRead' }
        '401': { description: Unauthorized }
        '403': { description: Forbidden (not the owning customer) }
        '404': { description: Not found }
        '500': { $ref: '#/components/responses/ServerError' }

  /v1/orders/{SalesOrderID}/status:
    put:
      operationId: OrderUpdateStatus
      summary: Change an order's status (Admin)
      tags: [Orders]
      parameters:
        - { name: SalesOrderID, in: path, required: true, schema: { type: integer } }
        - { $ref: '#/components/parameters/LastChangedUser' }
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                Status: { type: integer, description: 'target status 1..6', example: 2 }
                Comment: { type: string, example: 'Approved after stock check' }
      responses:
        '200': { $ref: '#/components/responses/Default' }
        '400': { $ref: '#/components/responses/ValidationError', description: 'illegal transition' }
        '401': { description: Unauthorized }
        '403': { description: Forbidden (Admin only) }
        '500': { $ref: '#/components/responses/ServerError' }

  # ---------------- Customers (Admin) ----------------
  /v1/customers:
    get:
      operationId: CustomerGetList
      summary: List customers (Admin)
      tags: [Customers (Admin)]
      parameters:
        - { name: q, in: query, required: false, schema: { type: string } }
        - { name: page, in: query, required: false, schema: { type: integer, default: 1 } }
        - { name: pageSize, in: query, required: false, schema: { type: integer, default: 20 } }
        - { name: sort, in: query, required: false, schema: { type: string, example: 'LastName:asc' } }
      responses:
        '200':
          description: OK
          content:
            application/json:
              schema: { $ref: '#/components/schemas/CustomerReadList' }
        '401': { description: Unauthorized }
        '403': { description: Forbidden (Admin only) }
        '500': { $ref: '#/components/responses/ServerError' }

  /v1/customers/{CustomerID}:
    get:
      operationId: CustomerGetById
      summary: Get a customer with order history (Admin)
      tags: [Customers (Admin)]
      parameters:
        - { name: CustomerID, in: path, required: true, schema: { type: integer } }
      responses:
        '200':
          description: OK
          content:
            application/json:
              schema: { $ref: '#/components/schemas/CustomerDetailRead' }
        '401': { description: Unauthorized }
        '403': { description: Forbidden (Admin only) }
        '404': { description: Not found }
        '500': { $ref: '#/components/responses/ServerError' }
    put:
      operationId: CustomerUpdate
      summary: Update a customer's contact details (Admin)
      tags: [Customers (Admin)]
      parameters:
        - { name: CustomerID, in: path, required: true, schema: { type: integer } }
        - { $ref: '#/components/parameters/LastChangedUser' }
      requestBody:
        required: true
        content:
          application/json:
            schema: { $ref: '#/components/schemas/CustomerWrite' }
      responses:
        '200': { $ref: '#/components/responses/Default' }
        '400': { $ref: '#/components/responses/ValidationError' }
        '401': { description: Unauthorized }
        '403': { description: Forbidden (Admin only) }
        '500': { $ref: '#/components/responses/ServerError' }

components:
  securitySchemes:
    SessionCookie:
      type: apiKey
      in: cookie
      name: session
      description: HttpOnly, Secure, SameSite=Strict session cookie set by POST /v1/auth/login.

  parameters:
    LastChangedUser:
      name: LastChangedUser
      in: header
      required: true
      description: Name of user performing the action (audit).
      schema: { type: string, example: 'Sam Admin' }
    ProductID:
      name: ProductID
      in: path
      required: true
      schema: { type: integer }

  responses:
    Default:
      description: OK
      content:
        application/json:
          schema: { $ref: '#/components/schemas/DefaultResponse' }
    ValidationError:
      description: Validation error (400)
      content:
        application/json:
          schema: { $ref: '#/components/schemas/DefaultResponse' }
    ServerError:
      description: Internal Server Error (500)
      content:
        application/json:
          schema: { $ref: '#/components/schemas/DefaultResponse' }

  schemas:
    DefaultResponse:
      type: object
      properties:
        Id: { type: integer }
        MessageType: { type: string, example: 'Success' }
        Messages:
          type: array
          items: { type: string }

    IdName:
      type: object
      properties:
        Id: { type: integer }
        Name: { type: string }
    IdNameList:
      type: object
      properties:
        Items:
          type: array
          items: { $ref: '#/components/schemas/IdName' }

    ShipMethod:
      type: object
      properties:
        ShipMethodID: { type: integer, example: 1 }
        Name: { type: string, example: 'XRQ - TRUCK GROUND' }
        ShipBase: { type: number, example: 3.95 }
        ShipRate: { type: number, example: 0.99 }
    ShipMethodList:
      type: object
      properties:
        Items:
          type: array
          items: { $ref: '#/components/schemas/ShipMethod' }

    ProductRead:
      type: object
      properties:
        ProductID: { type: integer, example: 707 }
        Name: { type: string, example: 'Sport-100 Helmet, Red' }
        ProductNumber: { type: string, example: 'HL-U509-R' }
        Color: { type: string, example: 'Red' }
        Size: { type: string, example: 'M' }
        ListPrice: { type: number, example: 34.99 }
        StandardCost: { type: number, example: 13.09 }
        CategoryId: { type: integer, example: 4 }
        CategoryName: { type: string, example: 'Accessories' }
        SubcategoryId: { type: integer, example: 31 }
        SubcategoryName: { type: string, example: 'Helmets' }
        Description: { type: string, example: 'Universal fit, well-vented, lightweight microshell.' }
        AvailableQuantity: { type: integer, example: 120 }
        InStock: { type: boolean, example: true }
        IsSellable: { type: boolean, example: true }
        SellStartDate: { type: string, format: date }
        SellEndDate: { type: string, format: date, nullable: true }
        LastChangedUser: { type: string }
        ModifiedDate: { type: string }
    ProductReadList:
      type: object
      properties:
        Items:
          type: array
          items: { $ref: '#/components/schemas/ProductRead' }
        TotalCount: { type: integer, example: 295 }
        Page: { type: integer, example: 1 }
        PageSize: { type: integer, example: 20 }
    ProductWrite:
      type: object
      required: [Name, ProductNumber, ListPrice, SubcategoryId]
      properties:
        Name: { type: string }
        ProductNumber: { type: string, description: 'Unique' }
        Color: { type: string }
        Size: { type: string }
        Weight: { type: number }
        ListPrice: { type: number }
        StandardCost: { type: number }
        SubcategoryId: { type: integer }

    InventoryWrite:
      type: object
      required: [LocationID, Quantity]
      properties:
        LocationID: { type: integer, example: 6 }
        Quantity: { type: integer, example: 250 }

    CartItemRead:
      type: object
      properties:
        ShoppingCartItemID: { type: integer, example: 4 }
        ProductID: { type: integer, example: 707 }
        ProductName: { type: string, example: 'Sport-100 Helmet, Red' }
        UnitPrice: { type: number, example: 34.99 }
        Quantity: { type: integer, example: 2 }
        LineTotal: { type: number, example: 69.98 }
        AvailableQuantity: { type: integer, example: 120 }
    CartRead:
      type: object
      properties:
        Items:
          type: array
          items: { $ref: '#/components/schemas/CartItemRead' }
        SubTotal: { type: number, example: 69.98 }
        ItemCount: { type: integer, example: 2 }
    CartItemWrite:
      type: object
      required: [ProductID, Quantity]
      properties:
        ProductID: { type: integer, example: 707 }
        Quantity: { type: integer, minimum: 1, example: 1 }

    OrderLineRead:
      type: object
      properties:
        SalesOrderDetailID: { type: integer }
        ProductID: { type: integer, example: 707 }
        ProductName: { type: string, example: 'Sport-100 Helmet, Red' }
        OrderQty: { type: integer, example: 2 }
        UnitPrice: { type: number, example: 34.99 }
        LineTotal: { type: number, example: 69.98 }
    OrderRead:
      type: object
      properties:
        SalesOrderID: { type: integer, example: 75123 }
        SalesOrderNumber: { type: string, example: 'SO75123' }
        OrderDate: { type: string, example: '2026-07-22 10:15:00' }
        ShipDate: { type: string, nullable: true }
        Status: { type: integer, example: 1 }
        StatusName: { type: string, example: 'In process' }
        CustomerID: { type: integer, example: 29485 }
        CustomerName: { type: string, example: 'Alex Customer' }
        SubTotal: { type: number, example: 69.98 }
        TaxAmt: { type: number, example: 5.60 }
        Freight: { type: number, example: 3.95 }
        TotalDue: { type: number, example: 79.53 }
    OrderReadList:
      type: object
      properties:
        Items:
          type: array
          items: { $ref: '#/components/schemas/OrderRead' }
        TotalCount: { type: integer }
        Page: { type: integer }
        PageSize: { type: integer }
    OrderDetailRead:
      allOf:
        - $ref: '#/components/schemas/OrderRead'
        - type: object
          properties:
            ShipToAddress: { type: string, example: '123 Elm St, Seattle, WA 98101' }
            ShipMethodName: { type: string, example: 'XRQ - TRUCK GROUND' }
            Comment: { type: string, nullable: true }
            Lines:
              type: array
              items: { $ref: '#/components/schemas/OrderLineRead' }
    OrderPlaceWrite:
      type: object
      required: [ShipToAddressID, ShipMethodID]
      properties:
        ShipToAddressID: { type: integer, example: 14 }
        BillToAddressID: { type: integer, example: 14 }
        ShipMethodID: { type: integer, example: 1 }
        Comment: { type: string, nullable: true }
    OrderPlaceResponse:
      type: object
      properties:
        SalesOrderID: { type: integer, example: 75123 }
        SalesOrderNumber: { type: string, example: 'SO75123' }
        TotalDue: { type: number, example: 79.53 }
        MessageType: { type: string, example: 'Success' }
        Messages:
          type: array
          items: { type: string }

    CustomerRead:
      type: object
      properties:
        CustomerID: { type: integer, example: 29485 }
        FirstName: { type: string, example: 'Alex' }
        LastName: { type: string, example: 'Customer' }
        EmailAddress: { type: string, example: 'customer@adventureworks.com' }
        AccountNumber: { type: string, example: 'AW00029485' }
        OrderCount: { type: integer, example: 3 }
    CustomerReadList:
      type: object
      properties:
        Items:
          type: array
          items: { $ref: '#/components/schemas/CustomerRead' }
        TotalCount: { type: integer }
        Page: { type: integer }
        PageSize: { type: integer }
    CustomerDetailRead:
      allOf:
        - $ref: '#/components/schemas/CustomerRead'
        - type: object
          properties:
            Orders:
              type: array
              items: { $ref: '#/components/schemas/OrderRead' }
    CustomerWrite:
      type: object
      properties:
        FirstName: { type: string }
        LastName: { type: string }
        EmailAddress: { type: string }
